<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-48ZKP0XD0B"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-48ZKP0XD0B');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's Taking Off?</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="https://whatsoverhead.rickt.dev/static/takingoff.ico" type="image/x-icon">

    <style>
        :root {
            --background-color: #ffffff;
            --text-color: #000000;
            --link-color: #0d6efd;
            --chatbox-background: #f9f9f9;
            --chatbox-border: #ccc;
            --button-background: #007BFF;
            --button-border: #007BFF;
            --button-hover-background: #0056b3;
            --button-color: #ffffff;
        }
        [data-theme="dark"] {
            --background-color: #121212;
            --text-color: #ffffff;
            --link-color: #81D4FA;
            --chatbox-background: #1e1e1e;
            --chatbox-border: #333;
            --button-background: #1E90FF;
            --button-border: #1C86EE;
            --button-hover-background: #1C86EE;
            --button-color: #ffffff;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
        }
        a { color: var(--link-color); }
        a:hover { text-decoration: underline; }

        .footer { background-color: rgba(0, 0, 0, 0.05); }
        [data-theme="dark"] .footer { background-color: rgba(255, 255, 255, 0.1); }
        [data-theme="dark"] .footer a.text-body { color: var(--link-color) !important; }

        #themeSwitcher {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 1100;
            width: 34px;
            height: 34px;
            border-radius: 999px;
            border: 1px solid #bfc6d1;
            background-color: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            padding: 0;
        }
        #themeSwitcher:hover { transform: scale(1.04); }
        [data-theme="dark"] #themeSwitcher {
            border-color: #4a4f57;
            background-color: rgba(34, 38, 44, 0.92);
        }

        .panel {
            background-color: var(--chatbox-background);
            color: var(--text-color);
            border: 1px solid var(--chatbox-border);
            width: 100%;
            max-width: 800px;
            padding: 18px;
            border-radius: 8px;
            margin: 12px auto;
            text-align: left;
        }

        .panel-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .panel-title {
            font-weight: 700;
            margin: 0;
            font-size: 1.05rem;
        }

        .panel-subtitle {
            opacity: 0.85;
            font-size: 0.9rem;
            margin: 0;
        }

        .error { color: red; }
        .success { color: green; }
        [data-theme="dark"] .success { color: #8FD19E; }

        .link-centered {
            text-align: center;
            display: block;
            margin-top: 12px;
        }

        .spinner-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
        }

        .airport-links-grid {
            margin-top: 16px;
            display: grid;
            grid-template-columns: repeat(4, minmax(44px, auto));
            justify-content: center;
            align-items: center;
            column-gap: 14px;
            row-gap: 8px;
            text-align: center;
        }
        .airport-links-grid a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            white-space: nowrap;
        }

        .hint-text {
            opacity: 0.85;
        }

        .hint-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            opacity: 0.85;
        }

        mark.bg-warning-subtle.text-success.fw-bold {
            border-radius: 0.35rem;
            padding: 0.1rem 0.45rem;
        }

        [data-theme="dark"] mark.bg-warning-subtle.text-success.fw-bold {
            background-color: rgba(173, 132, 39, 0.28) !important;
            color: #b8d7a8 !important;
        }

        .site-logo-link {
            display: inline-block;
            line-height: 0;
            margin-bottom: 20px;
        }

        .site-logo-img {
            display: block;
            max-height: 64px;
            max-width: 64px;
        }

        .site-title {
            margin-top: 0;
            margin-bottom: 16px;
        }
    </style>

    <link rel="icon" href="/plane.ico" type="image/x-icon">
</head>

<body class="d-flex flex-column min-vh-100" data-theme="light">
    <button id="themeSwitcher" type="button" aria-label="Toggle dark mode" title="Toggle dark mode"></button>
    <div class="container flex-fill">
        <div class="text-center my-3">
            <a href="/" class="site-logo-link"><img
                src="https://whatsoverhead.rickt.dev/static/takingoff.png"
                class="img-fluid site-logo-img"
                alt="What's Taking Off?"></a>

            <p id="headline" class="h3 fw-bold site-title">What's Taking Off?</p>

            <!-- We will render one panel per view here -->
            <div id="panels"></div>

            <div id="hint" class="mt-3 hint-text"></div>
            <div id="airportLinks" class="airport-links-grid"></div>
        </div>
    </div>

    <footer class="footer mt-auto py-3 text-center">
        <div class="container">
            <p class="mb-0">2025 by <a href="https://rickt.dev/" class="text-body">rickt</a></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

    <script>
        // ----- Theme handling -----
        const body = document.body;
        const themeSwitcher = document.getElementById('themeSwitcher');
        const prefersDarkScheme = window.matchMedia("(prefers-color-scheme: dark)");
        const THEME_PREF_KEY = 'whatsoverhead-theme-pref';

        function setTheme(theme) {
            body.setAttribute("data-theme", theme);
            const isDark = theme === "dark";
            themeSwitcher.textContent = isDark ? '☀️' : '🌙';
            themeSwitcher.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
            themeSwitcher.setAttribute('title', isDark ? 'Switch to light mode' : 'Switch to dark mode');
        }

        const savedTheme = localStorage.getItem(THEME_PREF_KEY);
        if (savedTheme === 'dark' || savedTheme === 'light') {
            setTheme(savedTheme);
        } else {
            setTheme(prefersDarkScheme.matches ? "dark" : "light");
        }

        prefersDarkScheme.addEventListener("change", (e) => {
            const persistedTheme = localStorage.getItem(THEME_PREF_KEY);
            if (persistedTheme === 'dark' || persistedTheme === 'light') return;
            setTheme(e.matches ? "dark" : "light");
        });
        themeSwitcher.addEventListener("click", () => {
            const currentTheme = body.getAttribute("data-theme");
            const nextTheme = currentTheme === "light" ? "dark" : "light";
            localStorage.setItem(THEME_PREF_KEY, nextTheme);
            setTheme(nextTheme);
        });

        const headlineEl = document.getElementById('headline');
        const panelsEl = document.getElementById('panels');
        const hintEl = document.getElementById('hint');
        const airportLinksEl = document.getElementById('airportLinks');
        const API_BASE = 'https://api.whatsoverhead.rickt.dev';

        function getRoute() {
            const params = new URLSearchParams(window.location.search);
            let code = (params.get('code') || '').trim();
            let view = (params.get('view') || '').trim();
            if (view === 'undefined' || view === 'null') view = '';

            if (!code) {
                const parts = window.location.pathname.split('/').filter(Boolean);
                code = (parts[0] || '').trim();
                view = (parts[1] || '').trim();
            }

            return { code: code.toLowerCase(), view: view.toLowerCase() };
        }

        async function loadCachedAirport(code) {
            const url = `${API_BASE}/cached?code=${encodeURIComponent(code)}`;
            const resp = await fetch(url, { cache: 'no-store' });

            if (resp.status === 404) {
                const e = new Error('Cache warming up, try again in a minute.');
                e.status = 404;
                throw e;
            }

            if (!resp.ok) {
                let text = '';
                try {
                    text = await resp.text();
                } catch (_) {}
                throw new Error(text || `Failed to load cached data (${resp.status}).`);
            }

            return await resp.json();
        }

        async function loadSupportedAirports() {
            const resp = await fetch(`${API_BASE}/airports`, { cache: 'no-store' });
            if (!resp.ok) return [];
            const data = await resp.json();
            return Array.isArray(data?.airports) ? data.airports : [];
        }

        function renderAirportLinks(airports, currentCode) {
            airportLinksEl.innerHTML = '';
            if (!Array.isArray(airports) || airports.length === 0) return;

            const items = airports.map((airport) => {
                const key = String(airport?.key || '').toLowerCase();
                const code = String(airport?.code || key).toUpperCase();
                return key ? { key, code } : null;
            }).filter(Boolean);

            if (items.length === 0) return;
            items.forEach((item) => {
                const a = document.createElement('a');
                a.href = `/static/takingoff/airport.html?code=${encodeURIComponent(item.key)}`;
                if (currentCode && item.key === currentCode.toLowerCase()) {
                    a.innerHTML = `<mark class="bg-warning-subtle text-success fw-bold">${item.code}</mark>`;
                } else {
                    a.textContent = item.code;
                }
                airportLinksEl.appendChild(a);
            });
        }

        function formatAge(seconds) {
            if (!Number.isFinite(seconds) || seconds < 0) return 'unknown';
            if (seconds < 60) return `${seconds}s ago`;
            const mins = Math.floor(seconds / 60);
            if (mins < 60) return `${mins}m ago`;
            const hours = Math.floor(mins / 60);
            const remMins = mins % 60;
            return remMins ? `${hours}h ${remMins}m ago` : `${hours}h ago`;
        }

        function setHintText(text) {
            hintEl.className = 'mt-3 hint-text';
            hintEl.textContent = text || '';
        }

        function setHintSummary(viewCount, airportCode, lastUpdatedText) {
            hintEl.className = 'mt-3 hint-row';
            hintEl.innerHTML = '';

            const summary = document.createElement('span');
            summary.textContent = `Showing ${viewCount} cached view${viewCount === 1 ? '' : 's'} for `;

            const airportMark = document.createElement('mark');
            airportMark.className = 'bg-warning-subtle text-success fw-bold';
            airportMark.textContent = airportCode;
            summary.appendChild(airportMark);
            summary.appendChild(document.createTextNode('.'));

            const updated = document.createElement('span');
            updated.textContent = lastUpdatedText;

            const seeOverhead = document.createElement('span');
            seeOverhead.appendChild(document.createTextNode('See '));
            const link = document.createElement('a');
            link.href = '/';
            link.textContent = "What's Overhead";
            seeOverhead.appendChild(link);
            seeOverhead.appendChild(document.createTextNode('.'));

            hintEl.appendChild(summary);
            hintEl.appendChild(updated);
            hintEl.appendChild(seeOverhead);
        }

        function setTitleAndHeader(titleText) {
            document.title = titleText;
            headlineEl.textContent = titleText;
        }

        function createPanel(title, subtitle) {
            const panel = document.createElement('div');
            panel.className = 'panel';

            const header = document.createElement('div');
            header.className = 'panel-header';

            const left = document.createElement('div');
            const h = document.createElement('p');
            h.className = 'panel-title';
            h.textContent = title;

            const s = document.createElement('p');
            s.className = 'panel-subtitle';
            s.textContent = subtitle || '';

            left.appendChild(h);
            if (subtitle) left.appendChild(s);

            header.appendChild(left);
            panel.appendChild(header);

            const content = document.createElement('div');
            panel.appendChild(content);

            return { panel, content };
        }

        function showPanelLoading(contentEl, message) {
            contentEl.innerHTML = `
                <div class="spinner-row">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">${message}</p>
                </div>
            `;
        }

        function showPanelMessage(contentEl, message, isError) {
            contentEl.innerHTML = '';
            const p = document.createElement('p');
            p.textContent = message;
            p.style.whiteSpace = 'pre-line';
            p.className = isError ? 'error' : 'success';
            contentEl.appendChild(p);
        }

        function addMapLink(contentEl, lat, lon, zoom, airportCode, viewLabel) {
            const mapUrl = `https://globe.adsbexchange.com/?lat=${lat}&lon=${lon}&zoom=${zoom}`;
            const link = document.createElement('a');
            link.href = mapUrl;
            link.textContent = viewLabel
                ? `Click HERE for aircraft map above ${airportCode} (${viewLabel}).`
                : `Click HERE for aircraft map above ${airportCode}.`;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.className = 'link-centered';
            contentEl.appendChild(link);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                panelsEl.innerHTML = '';
                const { code, view } = getRoute();
                const supportedAirports = await loadSupportedAirports();
                renderAirportLinks(supportedAirports, code);
                const airportsByKey = {};
                supportedAirports.forEach(a => {
                    const key = String(a?.key || '').toLowerCase();
                    if (key) airportsByKey[key] = a;
                });

                if (!code) {
                    setTitleAndHeader("What's Taking Off?");
                    setHintText('Try: /airport.html?code=lax or /airport.html?code=jfk');
                    return;
                }

                if (supportedAirports.length > 0 && !airportsByKey[code]) {
                    const guessedCode = code.toUpperCase();
                    setTitleAndHeader("What's Taking Off?");
                    const { panel, content } = createPanel('Unknown Airport', '');
                    panelsEl.appendChild(panel);
                    showPanelMessage(content, `Unsupported airport code "${guessedCode}".`, true);
                    const supportedCodes = supportedAirports.map(a => String(a?.code || '').toUpperCase()).filter(Boolean);
                    setHintText(supportedCodes.length
                        ? `Supported airports: ${supportedCodes.join(', ')}`
                        : 'Try a supported airport code.');
                    return;
                }

                const guessedCode = code.toUpperCase();
                setTitleAndHeader(`What's Taking Off at ${guessedCode}?`);
                const loadingPanel = createPanel(`${guessedCode} — Loading`, '');
                panelsEl.appendChild(loadingPanel.panel);
                showPanelLoading(loadingPanel.content, 'Loading cached departures...');

                const cached = await loadCachedAirport(code);
                const airportCode = (cached.code || guessedCode).toUpperCase();
                const titleText = cached.title || `What's Taking Off at ${airportCode}?`;
                setTitleAndHeader(titleText);

                const allResults = Array.isArray(cached.results) ? cached.results : [];
                if (allResults.length === 0) {
                    panelsEl.innerHTML = '';
                    const { panel, content } = createPanel(airportCode, '');
                    panelsEl.appendChild(panel);
                    showPanelMessage(content, 'No cached views found for this airport yet.', true);
                    setHintText('Cache warming up, try again in a minute.');
                    return;
                }

                const resultsByView = {};
                allResults.forEach(r => {
                    const key = String(r?.view || '').toLowerCase();
                    if (key && !resultsByView[key]) resultsByView[key] = r;
                });

                let selectedResults = allResults.slice();
                if (view) {
                    const picked = resultsByView[view];
                    if (!picked) {
                        panelsEl.innerHTML = '';
                        const { panel, content } = createPanel(airportCode, '');
                        panelsEl.appendChild(panel);
                        showPanelMessage(content, `Unknown view "${view}" for ${airportCode}.`, true);
                        const available = Object.keys(resultsByView).sort((a, b) => a.localeCompare(b));
                        setHintText(available.length ? `Available views: ${available.join(', ')}` : '');
                        return;
                    }
                    selectedResults = [picked];
                } else {
                    selectedResults.sort((a, b) => {
                        const av = String(a?.view || '');
                        const bv = String(b?.view || '');
                        return av.localeCompare(bv);
                    });
                }

                panelsEl.innerHTML = '';
                selectedResults.forEach(result => {
                    const viewName = String(result?.view || '').toLowerCase();
                    const label = result?.label || (viewName ? viewName.toUpperCase() : 'Departures');
                    const lat = Number(result?.lat);
                    const lon = Number(result?.lon);
                    const mapZoom = Number.isFinite(Number(result?.mapZoom)) ? Number(result.mapZoom) : 12.5;
                    const subtitle = (Number.isFinite(lat) && Number.isFinite(lon)) ? `${lat}, ${lon}` : '';
                    const { panel, content } = createPanel(`${airportCode} — ${label}`, subtitle);
                    panelsEl.appendChild(panel);

                    const message = (result?.message || '').trim();
                    showPanelMessage(content, message || 'No cached message for this view yet.', !message);
                    if (Number.isFinite(lat) && Number.isFinite(lon)) {
                        addMapLink(content, lat, lon, mapZoom, airportCode, label);
                    }
                });

                const updatedAtSec = Number(cached.updatedAt);
                const ageSeconds = Number.isFinite(updatedAtSec) ? Math.max(0, Math.floor(Date.now() / 1000) - updatedAtSec) : NaN;
                const lastUpdatedText = Number.isFinite(updatedAtSec) ? `Last updated ${formatAge(ageSeconds)}.` : 'Last updated unknown.';
                setHintSummary(selectedResults.length, airportCode, lastUpdatedText);

            } catch (err) {
                panelsEl.innerHTML = '';
                const { panel, content } = createPanel('Error', '');
                panelsEl.appendChild(panel);
                if (err?.status === 404) {
                    showPanelMessage(content, 'Cache warming up, try again in a minute.', true);
                    setHintText('No cached data yet. The scheduler will populate this shortly.');
                    return;
                }
                showPanelMessage(content, err?.message || 'Failed to initialize page.', true);
            }
        });
    </script>
</body>
</html>
