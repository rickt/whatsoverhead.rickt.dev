<!DOCTYPE html>
<html lang="en">
<head>
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-48ZKP0XD0B"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's Overhead?</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="/static/takingoff.ico" type="image/x-icon">
    <style>
        :root {
            --background-color: #ffffff;
            --text-color: #000000;
            --link-color: #0d6efd;
            --chatbox-background: #f9f9f9;
            --chatbox-border: #ccc;
            --button-background: #007BFF;
            --button-border: #007BFF;
            --button-hover-background: #0056b3;
            --button-color: #ffffff;
        }
        [data-theme="dark"] {
            --background-color: #121212;
            --text-color: #ffffff;
            --link-color: #81D4FA;
            --chatbox-background: #1e1e1e;
            --chatbox-border: #333;
            --button-background: #1E90FF;
            --button-border: #1C86EE;
            --button-hover-background: #1C86EE;
            --button-color: #ffffff;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
        }
        a {
            color: var(--link-color);
        }
        a:hover {
            text-decoration: underline;
        }
        .footer {
            background-color: rgba(0, 0, 0, 0.05);
        }
        [data-theme="dark"] .footer {
            background-color: rgba(255, 255, 255, 0.1);
        }
        [data-theme="dark"] .footer a.text-body {
            color: var(--link-color) !important;
        }
        #themeSwitcher {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 1100;
            width: 34px;
            height: 34px;
            border-radius: 999px;
            border: 1px solid #bfc6d1;
            background-color: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            padding: 0;
        }
        #themeSwitcher:hover {
            transform: scale(1.04);
        }
        [data-theme="dark"] #themeSwitcher {
            border-color: #4a4f57;
            background-color: rgba(34, 38, 44, 0.92);
        }
        #findPlaneBtn {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            background-color: var(--button-background);
            color: var(--button-color);
            border: 1px solid var(--button-border);
            border-radius: 5px;
            max-width: 250px;
            width: 100%;
            box-sizing: border-box;
            transition: background-color 0.3s, border-color 0.3s;
        }
        #findPlaneBtn:hover {
            background-color: var(--button-hover-background);
            border-color: var(--button-hover-background);
        }
        #result {
            background-color: var(--chatbox-background);
            color: var(--text-color);
            border: 1px solid var(--chatbox-border);
            width: 100%;
            max-width: 700px;
            height: auto;
            padding: 20px;
            border-radius: 5px;
            overflow-y: auto;
            margin: 0 auto;
            text-align: left;
        }
        .link-centered {
            text-align: center;
            display: block;
            margin-top: 8px;
        }
        .error {
            color: red;
        }
        .success {
            color: green;
        }
        [data-theme="dark"] .success {
            color: #8FD19E;
        }
        .airport-links {
            text-align: center;
            margin-top: 14px;
        }
        .airport-links-label {
            margin-bottom: 8px;
            opacity: 0.9;
        }
        .airport-links-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(44px, auto));
            justify-content: center;
            align-items: center;
            column-gap: 14px;
            row-gap: 8px;
        }
        .airport-links-grid a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            white-space: nowrap;
        }
        .site-logo-link {
            display: inline-block;
            line-height: 0;
            margin-bottom: 20px;
        }
        .site-logo-img {
            display: block;
            max-height: 64px;
            max-width: 64px;
        }
        .site-title {
            margin-top: 0;
            margin-bottom: 16px;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100" data-theme="light">
    <button id="themeSwitcher" type="button" aria-label="Toggle dark mode" title="Toggle dark mode"></button>
    <div class="container flex-fill">
        <div class="text-center my-3">
            <a href="/" class="site-logo-link"><img src="/static/takingoff.png" class="img-fluid site-logo-img" alt="What's Taking Off?"></a>
            <p class="h3 fw-bold site-title">What's Overhead?</p>
            <button id="findPlaneBtn" class="btn btn-primary mb-4">Find Nearest Aircraft</button>
            <div id="result" class="mt-4">
                <div id="spinner" class="d-none">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">Requesting location...</p>
                </div>
            </div>
            <div id="locationHint" class="mt-3" style="opacity:0.85;">You must grant Location Access to this page for What's Overhead to work!</div>
            <div class="airport-links">
                <div class="airport-links-label">See what's taking off at:</div>
                <div id="airportLinks" class="airport-links-grid">Loading...</div>
            </div>
        </div>
    </div>
    <footer class="footer mt-auto py-3 text-center">
        <div class="container">
            <p class="mb-0">2025 by <a href="https://rickt.dev/" class="text-body">rickt</a></p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
    <script>
        const body = document.body
        const themeSwitcher = document.getElementById('themeSwitcher')
        const prefersDarkScheme = window.matchMedia("(prefers-color-scheme: dark)")
        const THEME_PREF_KEY = 'whatsoverhead-theme-pref'

        function setTheme(theme) {
            body.setAttribute("data-theme", theme)
            const isDark = theme === "dark"
            themeSwitcher.textContent = isDark ? '☀️' : '🌙'
            themeSwitcher.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode')
            themeSwitcher.setAttribute('title', isDark ? 'Switch to light mode' : 'Switch to dark mode')
        }

        const savedTheme = localStorage.getItem(THEME_PREF_KEY)
        if (savedTheme === 'dark' || savedTheme === 'light') {
            setTheme(savedTheme)
        } else {
            setTheme(prefersDarkScheme.matches ? "dark" : "light")
        }

        prefersDarkScheme.addEventListener("change", (e) => {
            const persistedTheme = localStorage.getItem(THEME_PREF_KEY)
            if (persistedTheme === 'dark' || persistedTheme === 'light') return
            setTheme(e.matches ? "dark" : "light")
        })
        themeSwitcher.addEventListener("click", () => {
            const currentTheme = body.getAttribute("data-theme")
            const nextTheme = currentTheme === "light" ? "dark" : "light"
            localStorage.setItem(THEME_PREF_KEY, nextTheme)
            setTheme(nextTheme)
        })
        const resultDiv = document.getElementById('result')
        const airportLinksEl = document.getElementById('airportLinks')
        const findPlaneBtn = document.getElementById('findPlaneBtn')
        const API_BASE = 'https://api.whatsoverhead.rickt.dev'
        function displayMessage(message, isError = false) {
            resultDiv.innerHTML = ''
            const p = document.createElement('p')
            p.textContent = message
            p.className = isError ? 'error' : 'success'
            p.style.margin = '0'
            resultDiv.appendChild(p)
        }
        function showLoading(message = 'Requesting location...') {
            resultDiv.innerHTML = `
                <div class="d-flex flex-column align-items-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">${message}</p>
                </div>
            `
        }
        function fetchNearestPlane(lat, lon, dist = 5) {
            const params = new URLSearchParams({
                lat: lat,
                lon: lon,
                dist: dist,
                format: "text"
            })
            const url = `https://api.whatsoverhead.rickt.dev/nearest_plane?${params.toString()}`
            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        return response.text().then(errText => {
                            throw new Error(errText || 'unknown error occurred.')
                        })
                    }
                    return response.text()
                })
                .then(data => {
                    if (data) {
                        displayMessage(data, false)
                        const mapUrl = `https://globe.adsbexchange.com/?lat=${lat}&lon=${lon}&zoom=12.5`
                        const link = document.createElement('a')
                        link.href = mapUrl
                        link.textContent = 'Click HERE for aircraft map above you.'
                        link.target = '_blank'
                        link.rel = 'noopener noreferrer'
                        link.className = 'link-centered'
                        resultDiv.appendChild(link)
                    } else {
                        displayMessage('No data received from the api.', true)
                    }
                })
                .catch(error => {
                    if (error.message) {
                        displayMessage(error.message, true)
                    } else {
                        displayMessage('An unknown error occurred.', true)
                    }
                })
        }

        function errorCallback(error) {
            switch (error.code) {
                case error.PERMISSION_DENIED:
                    displayMessage('User denied the request for geolocation.', true)
                    break
                case error.POSITION_UNAVAILABLE:
                    displayMessage('Location information is unavailable.', true)
                    break
                case error.TIMEOUT:
                    displayMessage('Request to get user location timed out.', true)
                    break
                case error.UNKNOWN_ERROR:
                default:
                    displayMessage('An unknown error occurred while fetching location.', true)
                    break
            }
        }

        findPlaneBtn.addEventListener('click', () => {
            showLoading()
            if (!navigator.geolocation) {
                displayMessage('geolocation is not supported by your browser.', true)
                return
            }
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    fetchNearestPlane(position.coords.latitude, position.coords.longitude, 5)
                },
                errorCallback,
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            )
        })

        async function loadSupportedAirports() {
            try {
                const response = await fetch(`${API_BASE}/airports`, { cache: 'no-store' })
                if (!response.ok) throw new Error('failed to load airports')
                const data = await response.json()
                return Array.isArray(data?.airports) ? data.airports : []
            } catch (_) {
                return []
            }
        }

        function renderAirportLinks(airports) {
            if (!Array.isArray(airports) || airports.length === 0) {
                airportLinksEl.textContent = 'Unavailable right now.'
                return
            }

            airportLinksEl.innerHTML = ''
            const items = airports
                .map((airport) => {
                    const key = String(airport?.key || '').toLowerCase()
                    const code = String(airport?.code || key).toUpperCase()
                    return key ? { key, code } : null
                })
                .filter(Boolean)

            if (items.length === 0) {
                airportLinksEl.textContent = 'Unavailable right now.'
                return
            }
            items.forEach((item) => {
                const a = document.createElement('a')
                a.href = `/static/takingoff/airport.html?code=${encodeURIComponent(item.key)}`
                a.textContent = item.code
                airportLinksEl.appendChild(a)
            })
        }

        document.addEventListener('DOMContentLoaded', () => {
            displayMessage('Click "Find Nearest Aircraft" to begin.')
            loadSupportedAirports().then(renderAirportLinks)
        })
    </script>
</body>
</html>
